<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI for EDA 论文与资讯索引</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="layout-main">

<!-- ── 侧边栏 ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">🔬 AI for EDA</div>

  <div class="sidebar-tabs">
    <div class="sidebar-tab active" data-view="byDate">📅 按日期</div>
    <div class="sidebar-tab" data-view="byCategory">📂 按分类</div>
  </div>

  <div class="sidebar-search">
    <input type="text" id="sidebar-search" placeholder="🔍 搜索论文、新闻…" />
  </div>

  <nav class="sidebar-nav" id="sidebar-nav">
    <!-- 由 app.js 动态渲染 -->
  </nav>

  <div class="sidebar-footer">
    Powered by WorkBuddy · Last: <span id="sidebar-date">—</span>
  </div>
</aside>

<!-- ── 主区域 ── -->
<div class="main-wrap">
  <header>
    <h1>🔬 AI for EDA 论文与资讯索引</h1>
    <p class="subtitle">电子设计自动化 × 人工智能 · 持续追踪 arXiv cs.AR / cs.LG · 国内外行业动态</p>
    <div class="stats">
      <div class="stat"><div class="num" id="stat-papers">—</div><div class="label">论文收录</div></div>
      <div class="stat"><div class="num" id="stat-batches">—</div><div class="label">更新批次</div></div>
      <div class="stat"><div class="num" id="stat-news">—</div><div class="label">行业动态</div></div>
      <div class="stat"><div class="num" id="stat-last">—</div><div class="label" id="stat-update">加载中…</div></div>
    </div>
  </header>

  <main class="content" id="main-content">
    <div id="content-area">
      <div class="loading-msg">请点击左侧日期或分类查看内容</div>
    </div>
    <iframe id="content-frame" style="display:none;width:100%;height:100%;border:none;"></iframe>
  </main>

  <footer>
    Data Sources：arXiv API · GitHub · 各厂商官方博客 · SemiEngineering · HPC Wire
  </footer>
</div>

<!-- ── Scripts ── -->
<script src="manifest.js"></script>
<script src="app.js"></script>
</body>
</html>
